<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#0066B3;--blue-light:#0080D4;--blue-dark:#004D87;
  --bg:#F4F6F9;--card:#FFFFFF;
  --text:#212529;--sub:#6C757D;--border:#CED4DA;
  --shadow:0 2px 16px rgba(0,0,0,0.10)
}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;color:var(--text)}

/* Brand */
.brand{text-align:center;margin-bottom:20px}
.brand-logo{font-size:20px;font-weight:700;color:var(--blue);letter-spacing:.04em}
.brand-sub{font-size:13px;color:var(--sub);margin-top:4px}


/* Chat fullscreen */
#chat{display:flex;position:fixed;inset:0;background:#F0F4F8;flex-direction:column;z-index:100}
.chat-header{background:var(--blue);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-avatar{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.chat-hname{font-size:15px;font-weight:700;color:#fff}
.chat-hstatus{font-size:11px;color:rgba(255,255,255,0.75);margin-top:1px}
.chat-messages{flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:10px}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
.cmsg{max-width:80%;padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word;white-space:pre-wrap}
.cmsg.ai{background:#fff;border-bottom-left-radius:4px;align-self:flex-start;
  color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.cmsg.user{background:var(--blue);border-bottom-right-radius:4px;align-self:flex-end;color:#fff}
.cmsg.typing-dot{background:#fff;align-self:flex-start;border-bottom-left-radius:4px;
  color:var(--sub);font-style:italic;font-size:13px;padding:10px 15px;
  box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.chat-bar{background:#fff;padding:10px 12px;display:flex;gap:8px;
  align-items:flex-end;border-top:1px solid #E5E7EB;flex-shrink:0}
.chat-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:22px;
  font-size:14px;font-family:inherit;outline:none;resize:none;max-height:100px;
  overflow-y:auto;line-height:1.5;color:var(--text);background:#FAFCFF;transition:border-color .2s}
.chat-input:focus{border-color:var(--blue)}
.cicn-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.chat-voice-btn{background:#F3F4F6}
.chat-voice-btn:hover{background:#E5E7EB}
.chat-voice-btn.listening{background:#FEE2E2;animation:pulse 1s infinite}
.chat-send-btn{background:var(--blue)}
.chat-send-btn:hover{background:var(--blue-dark)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@media (max-width:480px){
  .chat-bar{gap:6px;padding:8px 8px}
  .cicn-btn{width:40px;height:40px}
  .chat-input{padding:10px 14px;font-size:16px}
}
</style>
</head>
<body>

<!-- Chat -->
<div id="chat">
  <div class="chat-header">
    <div class="chat-avatar">🤝</div>
    <div>
      <div class="chat-hname">Your AI Sponsor</div>
      <div class="chat-hstatus">● Online — here for you 24/7</div>
    </div>
    <a id="dayPill" href="ai-sponsor-journey.html" style="display:none;margin-left:auto;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);color:#fff;text-decoration:none;font-size:12.5px;font-weight:700;padding:6px 12px;border-radius:99px;white-space:nowrap"></a>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-bar">
    <textarea class="chat-input" id="chatInput" placeholder="Type or tap the mic to speak..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="cicn-btn chat-voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Speak">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button class="cicn-btn chat-send-btn" onclick="sendChat()" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
// Chat runs through the AI Sponsor backend — the Anthropic key lives server-side
// (in Render env), never in the browser. Backend: Express + Claude, SSE streaming.
const BACKEND_URL = 'https://ai-sponsor-f7de.onrender.com';

// Registered on this device? Reuse the same identity so the sponsor relationship
// is continuous, and show the "Day N" journey pill in the header.
let savedUser = null;
try { savedUser = JSON.parse(localStorage.getItem('ais_user')); } catch (e) {}
// Internal preview (?preview=N): render the Day-N pill without registering.
const previewDays = parseInt(new URLSearchParams(location.search).get('preview'));
if (previewDays > 0 && !savedUser) {
  savedUser = { signupDate: new Date(Date.now() - (previewDays - 1) * 86400000).toISOString() };
  document.getElementById('dayPill').href = 'ai-sponsor-journey.html?preview=' + previewDays;
}
const userId = (savedUser && savedUser.userId)
  ? savedUser.userId
  : 'web-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
if (savedUser && savedUser.signupDate) {
  const days = Math.max(1, Math.floor((Date.now() - new Date(savedUser.signupDate).getTime()) / 86400000) + 1);
  const pill = document.getElementById('dayPill');
  pill.textContent = '🌱 Day ' + days;
  pill.style.display = 'inline-block';
}
if (savedUser && savedUser.sponsorName) {
  document.querySelector('.chat-hname').textContent = savedUser.sponsorName;
}

let sessionReady = false;
let recognition = null;
let isListening = false;
let profile = { name: 'friend', program: 'AA', stage: 'active', why: '' };
if (savedUser && savedUser.name) profile.name = savedUser.name;

// When this page is opened with profile details (e.g. from registration), pick them up.
(function readProfileFromURL() {
  try {
    const p = new URLSearchParams(location.search);
    if (p.get('name'))    profile.name    = p.get('name');
    if (p.get('program')) profile.program = p.get('program');
    if (p.get('stage'))   profile.stage   = p.get('stage');
    if (p.get('why'))     profile.why     = p.get('why');
  } catch (e) {}
})();

// Register the user's profile with the backend so the sponsor knows who they are.
async function initSession() {
  try {
    await fetch(BACKEND_URL + '/api/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId,
        profile: {
          name: profile.name,
          program: profile.program,
          stage: profile.stage,
          whatBroughtYouHere: profile.why || ''
        }
      })
    });
    sessionReady = true;
  } catch (e) {
    console.error('AI Sponsor — session init failed:', e);
  }
}

function buildOpener() {
  const name  = profile.name ? profile.name.split(' ')[0] : 'friend';
  const prog  = profile.program || 'your program';
  const stage = profile.stage;
  const why   = profile.why;

  let msg = `Hey, I'm really glad you're here.\n\nI'm your sponsor, available 24/7. Whatever's on your mind, this is a safe space.\n\nWhat's going on?`;
  return msg;
}

function startChat() {
  const opener = buildOpener();
  addMessage('ai', opener);
  initSession(); // register profile with the backend (non-blocking)
  document.getElementById('chatInput').focus();
}

window.addEventListener('DOMContentLoaded', startChat);

function addMessage(role, text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'cmsg ' + role;
  div.textContent = text.trim();
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'cmsg typing-dot';
  div.id = 'typing';
  div.textContent = 'typing…';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  showTyping();

  // Make sure the profile is registered before the first message (handles cold starts).
  if (!sessionReady) await initSession();

  try {
    const res = await fetch(BACKEND_URL + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, message: text })
    });

    if (!res.ok || !res.body) {
      removeTyping();
      console.error('AI Sponsor chat — backend error. HTTP', res.status);
      addMessage('ai', "I'm here with you. Give me just a moment and try again.");
      return;
    }

    // Stream the SSE response token-by-token into one growing message bubble.
    removeTyping();
    const aiDiv = addMessage('ai', '');
    const msgs = document.getElementById('chatMessages');
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let full = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep any incomplete trailing line
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data:')) continue;
        const payload = trimmed.slice(5).trim();
        if (payload === '[DONE]') continue;
        try {
          const obj = JSON.parse(payload);
          if (obj.text) {
            full += obj.text;
            aiDiv.textContent = full;
            msgs.scrollTop = msgs.scrollHeight;
          } else if (obj.error) {
            console.error('AI Sponsor chat — stream error:', obj.error);
          }
        } catch (e) { /* ignore partial JSON */ }
      }
    }

    if (!full) {
      aiDiv.textContent = "I'm here with you. Give me just a moment and try again.";
    }
  } catch (err) {
    removeTyping();
    console.error('AI Sponsor chat — request failed:', err);
    addMessage('ai', "I'm having trouble connecting right now. I'm still here — try again in a moment.");
  }
}

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice input is not supported in this browser. Try Chrome.');
    return;
  }
  if (isListening) { recognition.stop(); return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;

  const btn = document.getElementById('voiceBtn');

  recognition.onstart = () => {
    isListening = true;
    btn.classList.add('listening');
  };
  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    const inp = document.getElementById('chatInput');
    inp.value = (inp.value ? inp.value + ' ' : '') + t;
    inp.style.height = 'auto';
    inp.style.height = inp.scrollHeight + 'px';
  };
  recognition.onend = () => {
    isListening = false;
    btn.classList.remove('listening');
  };
  recognition.onerror = () => {
    isListening = false;
    btn.classList.remove('listening');
  };
  recognition.start();
}
</script>
</body>
</html>
