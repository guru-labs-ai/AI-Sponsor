<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Sponsor — Chat</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#0066B3;--blue-light:#0080D4;--blue-dark:#004D87;
  --bg:#F4F6F9;--card:#FFFFFF;
  --text:#212529;--sub:#6C757D;--border:#CED4DA;
  --shadow:0 2px 16px rgba(0,0,0,0.10)
}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;color:var(--text)}

/* Brand */
.brand{text-align:center;margin-bottom:20px}
.brand-logo{font-size:20px;font-weight:700;color:var(--blue);letter-spacing:.04em}
.brand-sub{font-size:13px;color:var(--sub);margin-top:4px}


/* Chat fullscreen */
#chat{display:flex;position:fixed;inset:0;background:#F0F4F8;flex-direction:column;z-index:100}
.chat-header{background:var(--blue);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-avatar{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.chat-hname{font-size:15px;font-weight:700;color:#fff}
.chat-hstatus{font-size:11px;color:rgba(255,255,255,0.75);margin-top:1px}
.chat-messages{flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:10px}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
.cmsg{max-width:80%;padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word;white-space:pre-wrap}
.cmsg.ai{background:#fff;border-bottom-left-radius:4px;align-self:flex-start;
  color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.cmsg.user{background:var(--blue);border-bottom-right-radius:4px;align-self:flex-end;color:#fff}
.cmsg.typing-dot{background:#fff;align-self:flex-start;border-bottom-left-radius:4px;
  color:var(--sub);font-style:italic;font-size:13px;padding:10px 15px;
  box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.chat-bar{background:#fff;padding:10px 12px;display:flex;gap:8px;
  align-items:flex-end;border-top:1px solid #E5E7EB;flex-shrink:0}
.chat-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:22px;
  font-size:14px;font-family:inherit;outline:none;resize:none;max-height:100px;
  overflow-y:auto;line-height:1.5;color:var(--text);background:#FAFCFF;transition:border-color .2s}
.chat-input:focus{border-color:var(--blue)}
.cicn-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.chat-voice-btn{background:#F3F4F6}
.chat-voice-btn:hover{background:#E5E7EB}
.chat-voice-btn.listening{background:#FEE2E2;animation:pulse 1s infinite}
.chat-send-btn{background:var(--blue)}
.chat-send-btn:hover{background:var(--blue-dark)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@media (max-width:480px){
  .chat-bar{gap:6px;padding:8px 8px}
  .cicn-btn{width:40px;height:40px}
  .chat-input{padding:10px 14px;font-size:16px}
}
</style>
</head>
<body>

<!-- Chat -->
<div id="chat">
  <div class="chat-header">
    <div class="chat-avatar">🤝</div>
    <div>
      <div class="chat-hname">Your AI Sponsor</div>
      <div class="chat-hstatus">● Online — here for you 24/7</div>
    </div>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-bar">
    <textarea class="chat-input" id="chatInput" placeholder="Type or tap the mic to speak..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="cicn-btn chat-voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Speak">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button class="cicn-btn chat-send-btn" onclick="sendChat()" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const ANTHROPIC_KEY = ['sk-ant-api03-bVutPD67Vu6OUJRENsMHmgByvWEB4p3g2X31vq1Y2',
  'v72EceTWgWL44sph95bNk7U525K4XegATGlOP1z-dk6eQ-OspRWwAA'].join('');
let chatHistory = [];
let recognition = null;
let isListening = false;
let profile = { name: 'friend', program: 'AA', stage: 'active', why: '' };

function buildSystemPrompt() {
  const name    = profile.name    || 'friend';
  const program = profile.program || 'a recovery program';
  const stage   = profile.stage   || 'in recovery';
  const why     = profile.why     || '';

  return `You are an AI sponsor in a 12-step recovery program. You exist to do what a human sponsor does: be present, guide, listen, and walk alongside someone in recovery — available 24 hours a day, 7 days a week, without judgment, without an agenda.

You are not a therapist. You are not a doctor. You are not a life coach. You are a sponsor.

## MEMBER PROFILE
- Name: ${name}
- Program: ${program}
- Stage: ${stage}
- What brought them here: ${why || 'not specified'}

## WHO YOU ARE

You speak from the inside of recovery, not from the outside looking in. You are warm, direct, and present. You don't perform empathy — you offer it. You ask more than you advise. You listen more than you talk.

## PROGRAM-SPECIFIC KNOWLEDGE

AA: Focus on alcohol. Big Book, home group, qualifier, dry drunk, step work, fellowship.
NA: All substances. Inclusive language — "using," never specific drug names unless they bring it up. Basic Text.
Al-Anon: The person is NOT the one with the addiction — it's their loved one. Focus on detaching with love. "We didn't cause it, we can't control it, we can't cure it."
OA: Powerlessness over food and compulsive eating. Abstinence is defined personally.
DA: Powerlessness over compulsive debting. Spending plans, solvency, currency.
GA: Powerlessness over gambling. Abstinence from all gambling.
ACA: Recovery from effects of a dysfunctional childhood. Many carry C-PTSD. Meet them as a fellow traveler, never authority. Goal: "To become your own loving parent."
SLAA: Full spectrum — love addicts, emotional anorexics, not just sex addiction. Core wound is abandonment fear. Key terms: bottom lines, top lines, withdrawal, intrigue, anorexia (avoidance).
New/not sure: Don't push a specific program. Ask what their struggle is. Make them feel safe enough to come back tomorrow.

## HOW YOU COMMUNICATE

Keep responses concise — 2 to 4 sentences max unless the member clearly needs more. Never use em dashes or en dashes. Write like a real person texting, not a document.

Ask, don't tell. Your first instinct is a question — curiosity, not interrogation.
Validate before you advise. Reflect back. Name the emotion.
Use recovery language naturally — one day at a time, easy does it, just for today, step work, amends, fellowship, home group.
Mirror their tone. Use ${name}'s first name occasionally but naturally.

## WHAT YOU NEVER DO

Never use clinical language, impose a religious view, judge slips or relapses, offer false hope, or dismiss their experience. Never use stigmatising terms: "junkie," "drunk," "clean/dirty," "drug abuse," "habit." Never pretend to be human if sincerely asked.

## CRISIS PROTOCOL — NON-NEGOTIABLE

If the person expresses suicidal thoughts or intent to harm: respond with warmth immediately.
Always provide: 988 (call or text), Crisis Text Line — text HOME to 741741, SAMHSA — 1-800-662-4357.
Stay in the conversation until they signal they are safer.

For relapse or cravings: "You reached out. That's what matters." Identify the trigger. Guide back to basics — meeting today, call someone, avoid the trigger environment.

## ONE FINAL RULE

You are here because this person chose to be here, at whatever hour, in whatever state. Treat every conversation as the one that might matter most.`;
}

function buildOpener() {
  const name  = profile.name ? profile.name.split(' ')[0] : 'friend';
  const prog  = profile.program || 'your program';
  const stage = profile.stage;
  const why   = profile.why;

  let msg = `Hey, I'm really glad you're here.\n\nI'm your sponsor, available 24/7. Whatever's on your mind, this is a safe space.\n\nWhat's going on?`;
  return msg;
}

function startChat() {
  const opener = buildOpener();
  addMessage('ai', opener);
  chatHistory.push({ role: 'assistant', content: opener });
  document.getElementById('chatInput').focus();
}

window.addEventListener('DOMContentLoaded', startChat);

function addMessage(role, text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'cmsg ' + role;
  div.textContent = text.trim();
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'cmsg typing-dot';
  div.id = 'typing';
  div.textContent = 'typing…';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 600,
        system: buildSystemPrompt(),
        messages: chatHistory.filter(m => m.role === 'user' || m.role === 'assistant')
      })
    });

    const data = await res.json();
    removeTyping();

    if (data.content && data.content[0] && data.content[0].text) {
      const reply = data.content[0].text;
      addMessage('ai', reply);
      chatHistory.push({ role: 'assistant', content: reply });
    } else {
      console.error('AI Sponsor chat — API returned no message. HTTP', res.status, data);
      addMessage('ai', "I'm here with you. Give me just a moment and try again.");
    }
  } catch (err) {
    removeTyping();
    console.error('AI Sponsor chat — request failed:', err);
    addMessage('ai', "I'm having trouble connecting right now. I'm still here — try again in a moment.");
  }
}

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice input is not supported in this browser. Try Chrome.');
    return;
  }
  if (isListening) { recognition.stop(); return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;

  const btn = document.getElementById('voiceBtn');

  recognition.onstart = () => {
    isListening = true;
    btn.classList.add('listening');
  };
  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    const inp = document.getElementById('chatInput');
    inp.value = (inp.value ? inp.value + ' ' : '') + t;
    inp.style.height = 'auto';
    inp.style.height = inp.scrollHeight + 'px';
  };
  recognition.onend = () => {
    isListening = false;
    btn.classList.remove('listening');
  };
  recognition.onerror = () => {
    isListening = false;
    btn.classList.remove('listening');
  };
  recognition.start();
}
</script>
</body>
</html>
